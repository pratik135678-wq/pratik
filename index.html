<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Password Generator</title>
    <style>
        /* CSS: Styling the application */
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --bg-color: #dfe6e9;
            --text-color: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }

        h2 {
            color: var(--text-color);
            margin-bottom: 1.5rem;
        }

        /* The display box for the password */
        .result-container {
            background-color: #f1f2f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            border: 1px solid #ccc;
        }

        #password-result {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            word-break: break-all;
            color: var(--primary-color);
            border: none;
            background: transparent;
            width: 80%;
            outline: none;
        }

        .btn-copy {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .btn-copy:hover {
            background-color: #5649c0;
        }

        /* Settings section */
        .settings {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .setting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        label {
            font-size: 0.95rem;
            color: var(--text-color);
        }

        /* Custom Checkbox styling */
        input[type="checkbox"] {
            transform: scale(1.2);
            cursor: pointer;
        }

        /* Slider styling */
        .number-value {
            font-weight: bold;
            color: var(--primary-color);
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .btn-generate {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-generate:active {
            transform: scale(0.98);
        }

        /* Toast notification for copying */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 10px;
            position: fixed;
            z-index: 1;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }

        @keyframes fadeout {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Password Generator</h2>
        
        <div class="result-container">
            <input type="text" id="password-result" readonly placeholder="Click Generate">
            <button class="btn-copy" id="copy-btn">Copy</button>
        </div>

        <div class="settings">
            <div class="setting">
                <label for="length">Password Length</label>
                <span id="length-value" class="number-value">12</span>
            </div>
            <input type="range" id="length" min="4" max="32" value="12">

            <div class="setting">
                <label for="uppercase">Include Uppercase</label>
                <input type="checkbox" id="uppercase" checked>
            </div>
            <div class="setting">
                <label for="lowercase">Include Lowercase</label>
                <input type="checkbox" id="lowercase" checked>
            </div>
            <div class="setting">
                <label for="numbers">Include Numbers</label>
                <input type="checkbox" id="numbers" checked>
            </div>
            <div class="setting">
                <label for="symbols">Include Symbols</label>
                <input type="checkbox" id="symbols">
            </div>
        </div>

        <button class="btn-generate" id="generate-btn">Generate Password</button>
    </div>

    <!-- Toast Notification -->
    <div id="toast">Password copied to clipboard!</div>

    <script>
        // JavaScript: The Logic

        // 1. Select DOM elements
        const resultEl = document.getElementById('password-result');
        const lengthEl = document.getElementById('length');
        const lengthValueEl = document.getElementById('length-value');
        const uppercaseEl = document.getElementById('uppercase');
        const lowercaseEl = document.getElementById('lowercase');
        const numbersEl = document.getElementById('numbers');
        const symbolsEl = document.getElementById('symbols');
        const generateBtn = document.getElementById('generate-btn');
        const copyBtn = document.getElementById('copy-btn');
        const toast = document.getElementById("toast");

        // 2. Define character sets
        const randomFunc = {
            lower: getRandomLower,
            upper: getRandomUpper,
            number: getRandomNumber,
            symbol: getRandomSymbol
        };

        // 3. Event Listeners
        generateBtn.addEventListener('click', () => {
            const length = +lengthEl.value; // The + converts string to number
            const hasLower = lowercaseEl.checked;
            const hasUpper = uppercaseEl.checked;
            const hasNumber = numbersEl.checked;
            const hasSymbol = symbolsEl.checked;

            resultEl.value = generatePassword(hasLower, hasUpper, hasNumber, hasSymbol, length);
        });

        // Update slider value display
        lengthEl.addEventListener('input', (e) => {
            lengthValueEl.innerText = e.target.value;
        });

        // Copy functionality
        copyBtn.addEventListener('click', () => {
            const password = resultEl.value;
            if (!password) return;

            navigator.clipboard.writeText(password);
            showToast();
        });

        // 4. Core Functions
        function generatePassword(lower, upper, number, symbol, length) {
            let generatedPassword = '';
            
            // Filter out unchecked types
            const typesCount = lower + upper + number + symbol;
            const typesArr = [{lower}, {upper}, {number}, {symbol}].filter(
                item => Object.values(item)[0]
            );

            // If nothing is selected, return empty
            if(typesCount === 0) {
                return '';
            }

            // Create a loop for the length of the password
            for(let i = 0; i < length; i += typesCount) {
                typesArr.forEach(type => {
                    const funcName = Object.keys(type)[0];
                    generatedPassword += randomFunc[funcName]();
                });
            }

            // Slice the password to the exact length requested
            // (because the loop adds typesCount characters at a time)
            const finalPassword = generatedPassword.slice(0, length);
            
            // Shuffle the password so it's not predictable (e.g., always starts with Lower, Upper, Num...)
            return shuffleString(finalPassword);
        }

        function shuffleString(str) {
            return str.split('').sort(() => 0.5 - Math.random()).join('');
        }

        // Helper functions for character generation
        function getRandomLower() {
            return String.fromCharCode(Math.floor(Math.random() * 26) + 97);
        }

        function getRandomUpper() {
            return String.fromCharCode(Math.floor(Math.random() * 26) + 65);
        }

        function getRandomNumber() {
            return String.fromCharCode(Math.floor(Math.random() * 10) + 48);
        }

        function getRandomSymbol() {
            const symbols = '!@#$%^&*(){}[]=<>/,.';
            return symbols[Math.floor(Math.random() * symbols.length)];
        }

        // Toast Notification Logic
        function showToast() {
            toast.className = "show";
            setTimeout(function(){ 
                toast.className = toast.className.replace("show", ""); 
            }, 3000);
        }
    </script>
</body>
</html>
